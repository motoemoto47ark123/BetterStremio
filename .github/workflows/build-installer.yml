name: Build Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: installer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Build frontend
        run: deno task build

      - name: Compile installer executable
        run: deno task compile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterStremio-Installer-Windows
          path: installer/BetterStremio x86_64-pc-windows-msvc.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/BetterStremio x86_64-pc-windows-msvc.exe
          generate_release_notes: true
